{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Give Feedback | Chatpata Junction</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.12), transparent 25%),
        linear-gradient(135deg,#ff9a44,#ff6a00);
    }

    .feedback-wrapper{
      width:100%;
      max-width:500px;
      margin:auto;
    }

    .feedback-card{
      background:rgba(255,255,255,0.97);
      border-radius:24px;
      padding:30px 26px 24px;
      box-shadow:0 18px 45px rgba(0,0,0,0.18);
      border:1px solid rgba(255,255,255,0.4);
      position:relative;
      overflow:hidden;
      animation:fadeUp .45s ease;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(25px);}
      to{opacity:1;transform:translateY(0);}
    }

    .top-badge{
      width:72px;
      height:72px;
      margin:0 auto 16px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#ffd86f,#ffb300);
      color:#7a3d00;
      font-size:28px;
      box-shadow:0 10px 22px rgba(255,179,0,0.30);
    }

    .feedback-card h2{
      text-align:center;
      color:#8B4513;
      font-size:30px;
      font-weight:800;
      margin-bottom:8px;
    }

    .subtext{
      text-align:center;
      color:#666;
      font-size:15px;
      margin-bottom:22px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:9px;
      color:#5b2d09;
      font-weight:700;
    }

    textarea{
      width:100%;
      min-height:130px;
      padding:15px;
      border-radius:18px;
      border:1.5px solid #ead8c7;
    }

    .star-wrap{
      background:#fff9f4;
      border:1px solid #f1dccb;
      border-radius:18px;
      padding:16px;
    }

    .star-rating{
      display:flex;
      flex-direction:row-reverse;
      justify-content:center;
      gap:8px;
    }

    .star-rating input{display:none;}

    .star-rating label{
      font-size:34px;
      color:#d5d5d5;
      cursor:pointer;
    }

    .star-rating input:checked ~ label{
      color:#ff9800;
    }

    .submit-btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:14px;
      background:linear-gradient(135deg,#ffb300,#ff8a00);
      color:white;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
    }

    /* BACK BUTTON */
    .back-btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:13px;
      margin-top:12px;
      background:linear-gradient(135deg,#8B4513,#D2691E);
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:block;
      text-align:center;
    }

    .bottom-line{
      text-align:center;
      color:#7b7b7b;
      font-size:13px;
      margin-top:14px;
    }

    #popup{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      padding:14px;
      border-radius:14px;
      display:none;
      font-weight:700;
    }
  </style>
</head>

<body>


<div class="feedback-wrapper">
  <div class="feedback-card">

    <div class="top-badge">
      <i class="fa-solid fa-comments"></i>
    </div>

    <h2>Give Feedback</h2>
    <div class="subtext">We’d love to hear your thoughts.</div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Your Feedback</label>
        <textarea name="feedback" required></textarea>
      </div>

      <div class="form-group">
        <label>Rating</label>
        <div class="star-wrap">
          <div class="star-rating">
            <input type="radio" name="rating" id="star5" value="5" required>
            <label for="star5">★</label>

            <input type="radio" name="rating" id="star4" value="4">
            <label for="star4">★</label>

            <input type="radio" name="rating" id="star3" value="3">
            <label for="star3">★</label>

            <input type="radio" name="rating" id="star2" value="2">
            <label for="star2">★</label>

            <input type="radio" name="rating" id="star1" value="1">
            <label for="star1">★</label>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn">Submit Feedback</button>
    </form>

    <!-- ✅ BACK BUTTON -->
    <a href="{% url 'order_success' %}" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back 
    </a>

    <div class="bottom-line">Your opinion matters 💛</div>

  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <span id="popup-text"></span>
</div>

<script>
function showPopup(message){
  const popup = document.getElementById("popup");
  popup.innerHTML = message;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 3000);
}
</script>

{% if messages %}
<script>
{% for message in messages %}
  showPopup("{{ message|escapejs }}");
{% endfor %}
</script>
{% endif %}

</body>
</html>
