{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Chatpata Junction</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a56,#ff6a00);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.register-container{
width:100%;
max-width:500px;
background:white;
padding:22px 28px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.register-container h2{
text-align:center;
color:#d35400;
margin-bottom:14px;
font-size:30px;
}

.form-group{
margin-bottom:12px;
}

.form-group label{
display:block;
margin-bottom:4px;
font-weight:600;
color:#333;
font-size:14px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
font-size:14px;
transition:0.3s;
}

.form-group input:focus,
.form-group textarea:focus{
border-color:#ff6a00;
box-shadow:0 0 0 3px rgba(255,106,0,0.15);
}

.form-group textarea{
resize:none;
height:60px;
}

.register-btn{
width:100%;
background:#ff6a00;
color:white;
border:none;
padding:12px;
border-radius:25px;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:5px;
}

.login-link{
text-align:center;
margin-top:12px;
font-size:14px;
}

.login-link a{
color:#ff6a00;
font-weight:700;
text-decoration:none;
}

.message-box{
margin-bottom:10px;
}

.message{
padding:8px 10px;
border-radius:8px;
font-size:13px;
margin-bottom:5px;
}

.message.success{
background:#d4edda;
color:#155724;
}

.message.error{
background:#f8d7da;
color:#721c24;
}
</style>
</head>
<body>

<div class="register-container">

<h2>Create Account</h2>

{% if messages %}
<div class="message-box">
{% for message in messages %}
<div class="message {{message.tags}}">
{{message}}
</div>
{% endfor %}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Full Name</label>
<input type="text" name="name" placeholder="Enter Your Name"
oninput="this.value=this.value.replace(/[^a-zA-Z\s]/g,'')" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="Your Email" required >
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Your Password" required>
</div>

<div class="form-group">
<label>Address</label>
<textarea name="address" required></textarea>
</div>

<div class="form-group">
<label>Phone Number</label>

<input type="tel"name="phone"placeholder="Enter Contact Number"pattern="[0-9]{10}"
maxlength="10"oninput="this.value=this.value.replace(/[^0-9]/g,'')"
title="Enter a valid 10 digit mobile number"required>
</div>

<button type="submit" class="register-btn">Register</button>

</form>

<div class="login-link">
Already have an account?
<a href="{% url 'bow' %}">Login</a>
</div>

</div>

</body>
</html>
