<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Success</title>
  <style>
    body{
      font-family:'Segoe UI',sans-serif;
      background:#fff8ef;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }
    .box{
      background:#fff;
      padding:40px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
      text-align:center;
      max-width:500px;
    }
    h1{
      color:#8B4513;
      margin-bottom:15px;
    }
    p{
      color:#555;
      font-size:18px;
      margin-bottom:20px;
    }
    a{
      display:inline-block;
      padding:12px 24px;
      background:linear-gradient(135deg,#ffb347,#ff7b00);
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Order Placed Successfully 🎉</h1>
    <p>Thank you for shopping with Chatpata Junction.</p>

    <a href="{% url 'home' %}">Continue Shopping</a>
    
     <a href="{% url 'ad_feedback' %}">Give Feedback</a>

    
  </div>
</body>
</html>
