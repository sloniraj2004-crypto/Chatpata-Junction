{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product | Chatpata Junction</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      background:#f7efe4;
      color:#6b3b0d;
    }

    .dashboard-container{
      display:flex;
      min-height:100vh;
    }

    

    .main-content{
      margin-left:290px;
      width:calc(100% - 290px);
      padding:28px;
    }

    .top-bar{
      background:#ffffffcc;
      border-radius:24px;
      padding:26px 32px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:26px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
    }

    .top-bar h1{
      font-size:34px;
      color:#9a4d10;
      font-weight:800;
    }

    .admin-badge{
      background:#f2dfc6;
      color:#9a4d10;
      padding:15px 22px;
      border-radius:18px;
      font-size:18px;
      font-weight:700;
    }

    .form-box{
      background:#f2f2f2;
      border-radius:28px;
      padding:30px;
      box-shadow:0 6px 18px rgba(0,0,0,0.05);
      overflow:visible;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
    }

    .input-box{
      display:flex;
      flex-direction:column;
      position:relative;
      overflow:visible;
    }

    .input-box label{
      font-size:18px;
      font-weight:700;
      color:#9a4d10;
      margin-bottom:10px;
    }

    .input-box input,
    .input-box select{
      width:100%;
      padding:16px 18px;
      border:none;
      outline:none;
      border-radius:18px;
      background:#f2dfc6;
      font-size:16px;
      color:#5a3411;
    }

    .input-box select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      padding-right:48px;
      cursor:pointer;
      position:relative;
      z-index:2;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%237a3b00' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat:no-repeat;
      background-position:right 16px center;
      background-size:18px;
    }

    .input-box input[type="file"]{
      padding:14px 16px;
      cursor:pointer;
    }

    .btn-wrap{
      margin-top:24px;
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      outline:none;
      padding:15px 28px;
      border-radius:18px;
      cursor:pointer;
      font-size:17px;
      font-weight:700;
      transition:0.3s;
    }

    .btn-save{
      background:#d8731d;
      color:white;
    }

    .btn-reset{
      background:#f2dfc6;
      color:#8d470e;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    @media(max-width:900px){
      .sidebar{
        position:relative;
        width:100%;
        height:auto;
        border-radius:0;
      }

      .dashboard-container{
        flex-direction:column;
      }

      .main-content{
        margin-left:0;
        width:100%;
      }
    }

    @media(max-width:700px){
      .form-grid{
        grid-template-columns:1fr;
      }

      .top-bar{
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
      }

      .top-bar h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
<div class="dashboard-container">

  {% include 'asidebar.html'%}

  <div class="main-content">
    <div class="top-bar">
      <h1>Add Product</h1>
      <div class="admin-badge">Hi, {{ request.session.admin_name }}</div>
    </div>

    <div class="form-box">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">
          <div class="input-box">
            <label>Product Name</label>
            <input type="text" name="product_name" placeholder="Enter product name" required>
          </div>

          <div class="input-box">
            <label>Category</label>
            <select name="category" required>
              <option value="">Select Category</option>
              <option>Vegetable Pickles</option>
              <option>Fruit Pickles</option>
              <option>Regional Pickles</option>
              <option>Non-Veg Pickles</option>
              <option>Sweet Pickles</option>
              <option>Spicy Pickles</option>
              <option>Sweet & Sour Pickles</option>
              <option>Sour Pickles</option>
              <option>Oil Based Pickles</option>
              <option>Vinegar Pickles</option>
              <option>Sun Dried Pickles</option>
            </select>
          </div>

          <div class="input-box">
            <label>Price</label>
            <input type="number" name="price" placeholder="Enter price" required>
          </div>

          <div class="input-box">
            <label>Stock</label>
            <input type="number" name="stock" placeholder="Enter quantity" required>
          </div>

          <div class="input-box">
            <label>Product Image</label>
            <input type="file" name="image" required>
          </div>

          <div class="input-box">
            <label>Status</label>
            <select name="status" required>
              <option value="">Select Status</option>
              <option value="Available">Available</option>
              <option value="Out of Stock">Out of Stock</option>
            </select>
          </div>
        </div>

        <div class="btn-wrap">
          <button type="submit" class="btn btn-save">Save Product</button>
          <button type="reset" class="btn btn-reset">Reset</button>
        </div>
      </form>
    </div>
  </div>

</div>
</body>
</html>
