{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        .sidebar{
            width:250px;
            background:linear-gradient(180deg,#8B4513,#D2691E);
            color:white;
            padding:25px 18px;
            position:fixed;
            left:0;
            top:0;
            height:100vh;
            overflow-y:auto;
            box-shadow:6px 0 18px rgba(0,0,0,0.12);
        }

        .sidebar h2{
            color:#FFD700;
            text-align:center;
            font-size:28px;
            margin-bottom:8px;
            font-weight:900;
            line-height:1.2;
        }

        .sidebar .subtext{
            text-align:center;
            font-size:14px;
            margin-bottom:28px;
            opacity:0.9;
        }

        .menu{
            list-style:none;
        }

        .menu li{
            margin-bottom:12px;
        }

        .menu a{
            display:flex;
            align-items:center;
            gap:10px;
            text-decoration:none;
            color:white;
            padding:14px 16px;
            border-radius:14px;
            font-weight:600;
            transition:0.3s ease;
            background:rgba(255,255,255,0.10);
        }

        .menu a i{
            width:20px;
            text-align:center;
            font-size:16px;
        }

        .menu a:hover{
            background:#FFD700;
            color:#8B4513;
            transform:translateX(4px);
        }

        .menu a.active{
            background:#FFD700;
            color:#8B4513;
            box-shadow:0 6px 14px rgba(0,0,0,0.12);
        }

        @media(max-width:768px){
            .sidebar{
                position:relative;
                width:100%;
                height:auto;
                border-radius:0 0 20px 20px;
            }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>Chatpata Junction</h2>
    <div class="subtext">User Panel</div>

    <ul class="menu">
        <li>
            <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
        </li>

        <li>
            <a href="{% url 'profile' %}" class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
                <i class="fas fa-user"></i> My Profile
            </a>
        </li>

        <li>
            <a href="{% url 'orders' %}" class="{% if request.resolver_match.url_name == 'orders' %}active{% endif %}">
                <i class="fas fa-box"></i> My Orders
            </a>
        </li>

        <li>
            <a href="{% url 'payment' %}" class="{% if request.resolver_match.url_name == 'payment' %}active{% endif %}">
                <i class="fas fa-credit-card"></i> My Payments
            </a>
        </li>

         <li>
            <a href="{% url 'feedback' %}" class="{% if request.resolver_match.url_name == 'now' %}active{% endif %}">
                <i class="fa-solid fa-comment"></i></i> Feedback
            </a>
        </li>

        <li>
            <a href="{% url 'now' %}" class="{% if request.resolver_match.url_name == 'now' %}active{% endif %}">
                <i class="fas fa-store"></i> Shop
            </a>
        </li>

        <li>
            <a href="{% url 'logout' %}" class="{% if request.resolver_match.url_name == 'logout' %}active{% endif %}">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </li>
    </ul>
</aside>

</body>
</html>
